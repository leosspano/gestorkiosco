<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KioscOK 1.0.0 - Stock Productos</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="top-bar">
        <div class="brand">
            <a href="index.html" style="color: white; text-decoration: none; display: flex; align-items: center; gap: 12px;">
                <i class="fa-solid fa-cart-shopping logo-icon"></i>
                <span class="app-name">KioscOK 1.0.0</span>
            </a>
            <span class="divider">|</span>
            <span class="page-title">STOCK PRODUCTOS</span>
        </div>
        <div class="window-controls">
            <button class="win-btn"><i class="fa-solid fa-minus"></i></button>
            <button class="win-btn"><i class="fa-regular fa-square"></i></button>
            <button class="win-btn close-btn"><i class="fa-solid fa-xmark"></i></button>
        </div>
    </header>

    <nav class="action-menu">
        <button id="stock-agregar" class="menu-card">
            <div class="card-icon blue-icon"><i class="fa-solid fa-plus"></i></div>
            <span class="card-text">AGREGAR PRODUCTO</span>
        </button>
        <button id="stock-modificar" class="menu-card">
            <div class="card-icon light-blue-icon"><i class="fa-solid fa-pencil"></i></div>
            <span class="card-text">MODIFICAR PRODUCTO</span>
        </button>
        <button id="stock-borrar" class="menu-card">
            <div class="card-icon red-icon"><i class="fa-solid fa-trash-can"></i></div>
            <span class="card-text">BORRAR PRODUCTO</span>
        </button>
        <a href="index.html" class="menu-card link-card">
            <div class="card-icon dark-blue-icon"><i class="fa-solid fa-house"></i></div>
            <span class="card-text">PANEL PRINCIPAL</span>
        </a>
    </nav>

    <main class="main-container">
        <div class="table-responsive">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>CÓDIGO PRODUCTO</th>
                        <th>DESCRIPCIÓN PRODUCTO</th>
                        <th>MARCA</th>
                        <th>CANTIDAD DISPONIBLE</th>
                        <th>PRECIO COSTO</th>
                        <th>PRECIO VENTA</th>
                        <th>PROVEEDOR</th>
                    </tr>
                </thead>
                <tbody id="tabla-inventario">
                    </tbody>
            </table>
        </div>
    </main>

    <div id="modal-producto" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-stock-title">Agregar Producto</h2>
                <button class="close-modal-btn">&times;</button>
            </div>
            <form id="form-producto" class="modal-form">
                <input type="hidden" id="edit-index">
                
                <div class="form-group">
                    <label for="p-codigo">Código Producto:</label>
                    <input type="text" id="p-codigo" required placeholder="Ej: 0001 o Código de barra">
                </div>
                <div class="form-group">
                    <label for="p-descripcion">Descripción Producto:</label>
                    <input type="text" id="p-descripcion" required placeholder="Ej: Coca Cola 500ml">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="p-marca">Marca:</label>
                        <input type="text" id="p-marca" required placeholder="Ej: Coca Cola">
                    </div>
                    <div class="form-group">
                        <label for="p-categoria">Categoría:</label>
                        <select id="p-categoria">
                            <option value="Gaseosas">Gaseosas</option>
                            <option value="Aguas">Aguas</option>
                            <option value="Snacks">Snacks</option>
                            <option value="Golosinas">Golosinas</option>
                            <option value="Almacén">Almacén</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="p-costo">Precio Costo ($):</label>
                        <input type="number" id="p-costo" step="0.01" required placeholder="0.00">
                    </div>
                    <div class="form-group">
                        <label for="p-venta">Precio Venta ($):</label>
                        <input type="number" id="p-venta" step="0.01" required placeholder="0.00">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="p-cantidad">Cantidad Disponible:</label>
                        <input type="number" id="p-cantidad" min="0" required placeholder="0">
                    </div>
                    <div class="form-group">
                        <label for="p-proveedor">Proveedor:</label>
                        <input type="text" id="p-proveedor" required placeholder="Distribuidora...">
                    </div>
                </div>

                <div class="modal-actions" style="margin-top: 15px;">
                    <button type="button" class="btn-cancelar close-modal-btn">Cancelar</button>
                    <button type="submit" class="btn-finalizar" id="btn-guardar-stock">Guardar Producto</button>
                </div>
            </form>
        </div>
    </div>

    <footer class="status-bar">
        <div class="status-item"><i class="fa-solid fa-box"></i><span>Módulo de Inventario</span></div>
        <div class="status-right">
            <div class="status-item"><span class="status-dot connected"></span><span>Base Local Activa</span></div>
        </div>
    </footer>

    <script src="../js/stock.js"></script>
</body>
</html>
